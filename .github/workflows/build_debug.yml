name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager "build-tools;35.0.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Create dummy google-services.json
        run: |
          echo '{
            "project_info": {
              "project_number": "000000000000",
              "project_id": "dummy-project",
              "storage_bucket": "dummy-project.appspot.com"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                "android_client_info": { "package_name": "eu.kanade.tachiyomi" }
              },
              "api_key": [{ "current_key": "dummy_key" }],
              "services": {}
            }],
            "configuration_version": "1"
          }' > app/google-services.json

      - name: Create dummy client_secrets.json
        run: |
          echo '{}' > app/src/main/assets/client_secrets.json

      - name: Build Debug APK
        run: ./gradlew assembleStandardDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TachiyomiSZ-Debug
          path: app/build/outputs/apk/**/debug/*.apk
          retention-days: 7
